# Railway config for the WEEKLY S-1 scraper service.
#
# In Railway: select the S-1 service, then set
#   Settings -> Config-as-code -> Config File Path:  /railway.s1.toml
#
# Railway runs `startCommand` on the cron schedule, then the process exits.
# For a cron service, a clean exit is the intended outcome -- not a crash.

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "python main.py"

# Wednesdays at 09:00 UTC (= 02:00 America/Los_Angeles, PDT).
# Railway evaluates cron in UTC. For 9am Pacific instead, use "0 16 * * 3".
# To run a one-off test, temporarily set this to a few minutes ahead in UTC,
# then revert to this line.
cronSchedule = "0 9 * * 3"

restartPolicyType = "NEVER"
